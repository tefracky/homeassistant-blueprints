blueprint:
  name: Thermostat Benachrichtigung Fehler
  description: "Benachrichtigt, wenn ein Thermostat in einem bestimmten Raum nicht verfügbar ist"
  domain: automation
  source_url: "https://raw.githubusercontent.com/tefracky/homeassistant-blueprints/blueprints/automations/climate_problem.yaml"
  input:
    sensor:
      name: Thermostat Batteriesensor
      description: "Der Batteriesensor des Thermostats"
      selector:
        entity:
          domain: sensor
    climate:
      name: Thermostat Climate
      description: "Das Climate-Entity des Thermostats"
      selector:
        entity:
          domain: climate
    room:
      name: Raumname
      description: "Der Name des Raums"
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input sensor
  - platform: state
    entity_id: !input sensor
    for:
      hours: 1
      minutes: 0
      seconds: 0

condition:
  - condition: template
    value_template: >-
      {{ (now() | as_timestamp - states('sensor.hassio_uptime') | as_timestamp) > 10*60 }}
  - condition: state
    entity_id: binary_sensor.heizung_zuhause_sommermodus
    state: "off"

action:
  - if:
      - condition: or
        conditions:
          - condition: state
            entity_id: !input sensor
            state: unavailable
          - condition: template
            value_template: >-
              {{
              states[ (input.sensor ~ '_linkquality') ].last_changed
              < now() - timedelta(hours=1) }}
    then:
      - service: notify.oli_und_tina
        data:
          message: "Heizung {{ input.room }} nicht verfügbar"
          title: "Heizung nicht verfügbar"
          data:
            clickAction: "entityId:{{ input.climate }}"
            tag: "Heizung {{ input.room }}"
            persistent: true
            importance: default
            sticky: "false"
            group: Heizung
            channel: Heizung
      - service: persistent_notification.create
        data:
          message: "Heizung {{ input.room }} nicht verfügbar"
          title: "Heizung nicht verfügbar"
          notification_id: "Heizung {{ input.room }}"
    else:
      - service: notify.oli_und_tina
        data:
          message: clear_notification
          data:
            tag: "Heizung {{ input.room }}"
      - service: persistent_notification.dismiss
        data:
          notification_id: "Heizung {{ input.room }}"
mode: restart
