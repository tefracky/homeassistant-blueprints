blueprint:
  source_url: "https://raw.githubusercontent.com/tefracky/homeassistant-blueprints/blueprints/automations/door_sensor_notification_binary_sensor.yaml"
  name: Türsensor Benachrichtigung (mit binary_sensor)
  description: Benachrichtigung, wenn der Türsensor länger als 15 Minuten offen ist (mit binary_sensor)
  domain: automation
  input:
    door_sensor:
      name: Türsensor
      description: Sensor, welcher den Status des Türsensors angibt (input_boolean.door_sensor_work)
      selector:
        entity:
          domain: input_boolean
    binary_door_sensor:
      name: Türsensor
      description: Sensor, welcher den Status des Türsensors angibt (binary_sensor.door_sensor_work)
      selector:
        entity:
          domain: binary_sensor
    room:
      name: Raumname
      description: Raumname, der bei der Benachrichtigung angezeigt wird (Arbeitszimmer)
      selector:
        text:
    room_en:
      name: Raumname englisch
      description: Raumname in englisch und klein geschrieben (work)
      selector:
        text:

variables:
  sensor: !input 'door_sensor'
  binary_sensor: !input 'binary_door_sensor'
  room: !input 'room'
  room_en: !input 'room_en'

trigger:
  - id: door_closed
    platform: state
    entity_id: !input binary_door_sensor
    to: 'off'
  - id: door_open
    platform: state
    entity_id: !input binary_door_sensor
    to: 'on'
    for:
      hours: 0
      minutes: 15
      seconds: 0
  - id: notification_dismiss
    platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: binary_door_sensor_{{ room_en }}_dismiss
  - id: notification_close
    platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: binary_door_sensor_{{ room_en }}_close

action:
  - choose:
    - conditions:
        - condition: trigger
          id:
            - door_open
      sequence:
        - service: notify.all_devices
          data:
            message: "{{ room }} ist schon länger als 15 Minuten offen"
            data:
              clickAction: entityId:{{ binary_sensor }}
              channel: Türsensor {{ room }}
              persistent: true
              importance: high
              sticky: 'true'
              actions:
              - action: binary_door_sensor_{{ room_en }}_dismiss
                title: Schließen
              - action: binary_door_sensor_{{ room_en }}_close
                title: Ausschalten
              tag: Türsensor {{ room }}
            title: Türsensor {{ room }}
    - conditions:
        - condition: trigger
          id:
            - notification_close
      sequence:
        - service: input_boolean.turn_off
          data: {}
          target:
            entity_id: !input door_sensor
    - conditions:
        - condition: trigger
          id:
            - notification_dismiss
            - door_closed
      sequence:
        - service: notify.all_devices
          data:
            message: clear_notification
            data:
              tag: Türsensor {{ room }}
mode: restart
